# Example Discord permissions policy.
#
# Drop this at one of:
#   ~/.zad/services/discord/permissions.toml                       (global)
#   ~/.zad/projects/<slug>/services/discord/permissions.toml       (local, per project)
#
# When both files exist they INTERSECT: a call must pass every file
# that is present. Missing files contribute no restrictions, so scope
# is the only gate when neither file exists.
#
# Pattern grammar (used anywhere an allow/deny list appears):
#
#   "general"           exact name match
#   "bot-*", "team/*"   glob (`*` and `?` wildcards; other regex
#                       metacharacters are escaped)
#   "re:^mod-[0-9]+$"   full Rust regex (anchor it yourself)
#   "1234567890"        numeric — matches the resolved snowflake
#
# Evaluation order:
#   1. Any deny match -> denied (deny always wins).
#   2. Empty allow list -> no positive constraint on this front.
#   3. Otherwise the call must match at least one allow pattern.
#
# Every rule is evaluated against every alias of the target: the raw
# input (with `#` or `@` stripped), the resolved snowflake, and every
# name the local directory.toml maps to that snowflake. So a deny on
# `*admin*` fires even when the agent pastes the raw ID, as long as
# `zad discord discover` (or a hand-edited directory) knows the ID
# under an admin-like name.

# -----------------------------------------------------------------
# Shared defaults. Each per-function block inherits from these and
# can narrow them further (never loosen).
# -----------------------------------------------------------------
[content]
# Case-insensitive substring match. Any hit in the outbound body
# denies the send.
deny_words = ["password", "api_key", "secret", "token"]
# Regex match. Great for catching credential shapes.
deny_patterns = [
    "(?i)bearer\\s+[a-z0-9._-]+",
    "(?i)AKIA[0-9A-Z]{16}",
]
# Codepoints. Only *tightens* Discord's 2000-char hard cap.
max_length = 1500

[time]
# UTC. An empty `days` list admits every day; an empty `windows`
# list admits the whole day. Windows may cross midnight ("22:00-02:00").
days    = ["mon", "tue", "wed", "thu", "fri"]
windows = ["09:00-18:00"]

# -----------------------------------------------------------------
# Per-function blocks
# -----------------------------------------------------------------

[send]
# Only team-prefixed channels and public coordination rooms.
channels.allow = ["general", "team/*", "bot-*"]
# Nothing admin-like, no ops channels, no direct ops noise.
channels.deny  = ["*admin*", "mod-*", "ops-*"]
# DMs are allow-listed — agents should not cold-DM strangers.
users.allow    = ["alice", "bob"]

[read]
# Reading is broader than writing, but still skip anything marked
# private.
channels.deny = ["*private*", "*admin*"]

[channels]
# Listing guilds is fine, but only for our main workspace.
guilds.allow = ["main-server"]

[join]
# Never auto-join an admin thread.
channels.deny = ["*admin*"]

[leave]
# No restrictions — an agent may always retreat from a thread.

[discover]
# Keep the discovery walk confined to one guild.
guilds.allow = ["main-server"]

[manage]
# Default-deny for channels.manage. Opt channels in explicitly if
# you ever want the library layer to create/delete something.
channels.allow = []
channels.deny  = ["*"]
