name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to no permissions — every job declares its own least-privilege
# scopes (OSS_SPEC §10.3).
permissions: {}

jobs:
  # Core build/test/lint/fmt-check matrix. Per OSS_SPEC §9 CI invokes
  # the `make` targets directly so local and CI environments cannot
  # drift.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt
      - name: make build
        run: make build
      - name: make test
        run: make test
      - name: make lint
        run: make lint
      - name: make fmt-check
        run: make fmt-check

  # Verify that tool-specific agent-guidance files remain symlinks to
  # AGENTS.md (OSS_SPEC §7.1) and that `.claude/skills` resolves to
  # `.agent/skills` (OSS_SPEC §21.2).
  symlinks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Check agent symlinks
        run: ./scripts/check-agent-symlinks.sh

  # Software composition analysis (OSS_SPEC §14). Fails the build on
  # high-severity advisories against the `cargo` lockfile.
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      # Invoke cargo-audit directly instead of rustsec/audit-check@v2
      # so the advisory report is always visible in the job log — the
      # action publishes via the Check API, which is unavailable on PRs
      # from forks, hiding the reason for the failure. Waivers live in
      # `.cargo/audit.toml` (see OSS_SPEC.md §14).
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        # Waivers are documented in `.cargo/audit.toml`; the flags here
        # are the authoritative list cargo-audit acts on. Keep the two
        # in sync. Each ID has a rationale in the TOML file.
        run: |
          cargo audit \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099

  # Pages staleness check (OSS_SPEC §11.2). The deploy extractor
  # scrapes the clap source directly (no Rust toolchain needed on the
  # Pages runner), so this CI job is the one place that runs the live
  # binary and diffs its `zad commands --json` output against the
  # scrape. Any drift fails here, restoring the §11.2 guarantee.
  pages-staleness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Build pages
        run: make pages
      - name: Diff scrape against `zad commands --json`
        run: |
          cargo build --bin zad --quiet
          ./target/debug/zad commands --json > /tmp/binary.json
          node -e '
            const fs = require("fs");
            const binary = JSON.parse(fs.readFileSync("/tmp/binary.json", "utf8")).commands;
            const scrape = JSON.parse(fs.readFileSync("pages/src/generated/sourceData.json", "utf8")).commands.commands;
            const norm = (cs) => cs.map(c => c.path.join("/") + "|" + (c.description || "")).sort();
            const b = norm(binary);
            const s = norm(scrape);
            const onlyB = b.filter(x => !s.includes(x));
            const onlyS = s.filter(x => !b.includes(x));
            if (onlyB.length || onlyS.length) {
              console.error("pages extractor drifted from zad commands --json");
              if (onlyB.length) { console.error("only in binary:"); onlyB.forEach(x => console.error("  " + x)); }
              if (onlyS.length) { console.error("only in scrape:"); onlyS.forEach(x => console.error("  " + x)); }
              process.exit(1);
            }
            console.log("pages scrape matches binary (" + b.length + " commands)");
          '
