name: release

# Triggered by the `v*` tag push that version-bump performs. The tag
# push must be authenticated with RELEASE_TOKEN (a PAT or GitHub App
# token) — the default GITHUB_TOKEN deliberately suppresses downstream
# workflow triggers, so a tag pushed with it would not fire this
# workflow. See OSS_SPEC §10.3.
on:
  push:
    tags:
      - 'v*'

# Default to no permissions; every job declares its own
# least-privilege `permissions:` block (see OSS_SPEC §10.3).
permissions: {}

jobs:
  # Step 1 — regenerate CHANGELOG.md + bump manifest versions, then
  # force-push the rewritten tag at the generated release commit.
  prepare:
    name: Prepare release commit
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      sha: ${{ steps.sha.outputs.sha }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - name: Resolve tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
      - name: Generate changelog
        run: ./scripts/generate-changelog.sh ${{ steps.tag.outputs.tag }}
      - name: Update versions
        run: ./scripts/update-versions.sh ${{ steps.tag.outputs.tag }}
      - name: Commit + retag
        run: |
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore(release): update changelog and versions for ${{ steps.tag.outputs.tag }}"
          git tag -f "${{ steps.tag.outputs.tag }}" HEAD
          git push origin HEAD:main
          git push origin "${{ steps.tag.outputs.tag }}" --force
      - name: Resolve commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  # Step 2 — build release artifacts in a matrix covering every target
  # platform. Each job checks out the rewritten tag so it sees the
  # bumped versions and generated changelog.
  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: zad-x86_64-unknown-linux-gnu
            binary: zad
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: zad-aarch64-apple-darwin
            binary: zad
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: zad-x86_64-pc-windows-msvc
            binary: zad.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.target }}
      - name: make test
        run: make test
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}

  # Step 3 — publish artifacts with SLSA build-provenance attestations
  # and create the GitHub Release. Crates.io publishing stays commented
  # until the crate is registered for trusted publishing — see the note
  # in OSS_SPEC §10.3 ("Trusted publishing is mandatory").
  publish:
    name: Publish
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create the GitHub Release
      id-token: write          # OIDC for trusted publishing + attestations
      attestations: write      # mint provenance attestations
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;
          ls -l release
      - name: Generate provenance attestations
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'release/*'
      # Publishing MUST use crates.io trusted publishing (OIDC).
      # Configure the crate on crates.io first, then uncomment:
      # - uses: rust-lang/crates-io-auth-action@v1
      #   id: auth
      # - run: cargo publish
      #   env:
      #     CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: release/*
